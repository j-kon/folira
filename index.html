<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAF8F5" />
    <meta name="description" content="Folira - Read anything. Even offline. Your private library, always within reach." />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Folira - Read anything. Even offline." />
    <meta property="og:description" content="Your private library, always within reach. Read documents offline on your device with 100% privacy." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Folira - Read anything. Even offline." />
    <meta name="twitter:description" content="Your private library, always within reach. Read documents offline on your device with 100% privacy." />
    <meta name="twitter:image" content="/og-image.png" />

    <title>Folira — Read anything. Even offline.</title>

    <script>
      (function() {
        try {
          var stored = localStorage.getItem('folira-ui-settings');
          var isDark = false;
          if (stored) {
            var parsed = JSON.parse(stored);
            if (parsed && parsed.state && parsed.state.theme === 'dark') {
              isDark = true;
            }
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            isDark = true;
          }
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
